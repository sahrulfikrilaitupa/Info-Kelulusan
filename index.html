<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengumuman Kelulusan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>
<!-- <body class="bg-gray-100"> -->
<body class="bg-gray-100 bg-[url('/bgmatsanesa.jpg')] bg-cover bg-center bg-no-repeat relative">

    <!-- Admin Dashboard -->
    <div id="admin-dashboard" class="hidden min-h-screen flex">
        <aside class="w-64 bg-slate-800 text-white p-6">
            <h2 class="text-xl font-bold mb-8">Admin Panel</h2>
            <nav class="space-y-4">
                <a href="#" onclick="showPage('dash')" class="block hover:text-blue-400">Dashboard</a>
                <a href="#" onclick="showPage('data')" class="block hover:text-blue-400">Data Siswa</a>
                <div class="mt-10 border-t pt-4">
                    <label class="block text-xs mb-1">Set Tanggal & Jam Buka</label>
                    <input type="datetime-local" id="set-waktu" class="text-black w-full p-1 rounded" onchange="saveWaktu()">
                </div>
                <button onclick="changePassword()" class="block w-full text-left hover:text-yellow-400 mt-4 text-sm">Ganti Password Admin</button>
                <a href="#" class="block hover:text-red-400 mt-5" onclick="logoutAdmin()">Logout</a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <div id="page-dash">
                <h1 class="text-2xl font-bold mb-6">Dashboard Ringkasan</h1>
                <div class="grid grid-cols-3 gap-6 mb-8">
                    <div class="bg-white p-6 rounded-lg shadow"><h3>Total Siswa</h3><p id="stat-total" class="text-3xl font-bold">0</p></div>
                    <div class="bg-white p-6 rounded-lg shadow"><h3>Lulus</h3><p id="stat-lulus" class="text-3xl font-bold text-blue-600">0</p></div>
                    <div class="bg-white p-6 rounded-lg shadow"><h3>Tidak Lulus</h3><p id="stat-tdk" class="text-3xl font-bold text-red-600">0</p></div>
                </div>
                <div class="bg-white p-6 rounded-lg shadow w-1/2 mb-8"><canvas id="kelulusanChart"></canvas></div>
            </div>

            <div id="page-data" class="hidden">
                <h1 class="text-2xl font-bold mb-6">Manajemen Data Siswa</h1>
                <div class="bg-white p-6 rounded-lg shadow mb-8">
                    <div class="mb-4 p-4 border-b">
                        <p class="text-sm text-gray-600 mb-2">Import Data via CSV (Format: Nama,NISN,TglLahir(YYYY-MM-DD),Status)</p>
                        <input type="file" id="csvFile" accept=".csv" class="mb-2">
                        <button onclick="importCSV()" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">Import CSV</button>
                    </div>
                    <form id="addSiswaForm" class="grid grid-cols-2 gap-4">
                        <input type="text" id="in-nama" placeholder="Nama Lengkap" class="border p-2 rounded" required>
                        <input type="text" id="in-nisn" placeholder="NISN" class="border p-2 rounded" required>
                        <input type="date" id="in-tgl" class="border p-2 rounded" required>
                        <select id="in-status" class="border p-2 rounded"><option>Lulus</option><option>Tidak Lulus</option></select>
                        <button type="submit" class="bg-green-600 text-white p-2 rounded col-span-2">Simpan Data</button>
                    </form>
                </div>
                <div class="bg-white p-6 rounded-lg shadow">
                    <table id="siswaTable" class="display w-full">
                        <thead><tr><th>Nama</th><th>NISN</th><th>Tgl Lahir</th><th>Status</th><th>Aksi</th></tr></thead>
                        <tbody id="tableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Login Page -->
    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md text-center">
            <img src="matsanesa.png" alt="Logo" class="mx-auto mb-4 w-24 h-24">
            <h2 id="title-text" class="text-sm font-bold text-gray-800">INFORMASI KELULUSAN</h2>
            <h1 id="title-text" class="text-2xl font-bold text-gray-800">MTsN 1 MALUKU TENGAH</h1>
            
            <div id="admin-login-form" class="hidden space-y-4 mt-6">
                <input type="text" id="admin-user" placeholder="Username" class="w-full p-3 border rounded-lg">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full p-3 border rounded-lg">
                <button onclick="checkAdmin()" class="w-full bg-slate-800 text-white py-3 rounded-lg">Login Admin</button>
                <button onclick="toggleLogin(false)" class="text-sm text-gray-500">Kembali</button>
            </div>

            <div id="user-portal" class="space-y-4 mt-6">
                <div id="time-gate" class="hidden">
                    <p id="gate-msg" class="text-red-500 font-bold"></p>
                    <div id="timer" class="text-xl font-mono my-4">--:--:--</div>
                </div>
                <form id="siswaLoginForm" class="space-y-4">
                    <input type="text" id="login-nisn" placeholder="Masukkan NISN" class="w-full p-3 border rounded-lg" required>
                    <input type="date" id="login-tgl" class="w-full p-3 border rounded-lg" required>
                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">Lihat Hasil</button>
                </form>
                <button onclick="toggleLogin(true)" class="text-xs text-gray-400 mt-6 hover:text-blue-600">
                    <img src="admin.png" alt="Admin" class="inline-block w-5 h-5 mr-2">
                    <!-- Admin Login -->
                </button>
            </div>
        </div>
    </div>

    <script>
        let dataSiswa = JSON.parse(localStorage.getItem('dataSiswa')) || [];
        let targetWaktu = localStorage.getItem('targetWaktu') || "";
        let adminCreds = JSON.parse(localStorage.getItem('adminCreds')) || { user: 'admin', pass: 'admin123' };
        
        document.getElementById('set-waktu').value = targetWaktu;

        function toggleLogin(isAdmin) {
            if (isAdmin) {
                document.getElementById('admin-user').value = "";
                document.getElementById('admin-pass').value = "";
            }
            document.getElementById('admin-login-form').classList.toggle('hidden', !isAdmin);
            document.getElementById('user-portal').classList.toggle('hidden', isAdmin);
        }

        function checkAdmin() {
            if ($('#admin-user').val() === adminCreds.user && $('#admin-pass').val() === adminCreds.pass) {
                document.getElementById('admin-dashboard').classList.remove('hidden');
                document.getElementById('login-page').classList.add('hidden');
                if (!$.fn.DataTable.isDataTable('#siswaTable')) table = $('#siswaTable').DataTable();
                refreshTable(); showPage('dash');
            } else { Swal.fire('Error', 'Username/Password salah', 'error'); }
        }

        function changePassword() {
            Swal.fire({
                title: 'Ganti Password',
                html: '<input id="new-pass" type="password" class="swal2-input" placeholder="Password Baru">',
                preConfirm: () => {
                    adminCreds.pass = $('#new-pass').val();
                    localStorage.setItem('adminCreds', JSON.stringify(adminCreds));
                    Swal.fire('Sukses', 'Password berhasil diubah', 'success');
                }
            });
        }

        function saveWaktu() {
            localStorage.setItem('targetWaktu', document.getElementById('set-waktu').value);
            targetWaktu = document.getElementById('set-waktu').value;
        }

        function importCSV() {
            const file = document.getElementById('csvFile').files[0];
            if (!file) return Swal.fire('Error', 'Pilih file CSV', 'error');
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split('\n');
                lines.forEach(line => {
                    const [nama, nisn, tgl, status] = line.split(',');
                    if (nama && nisn && tgl && status) dataSiswa.push({ nama: nama.trim(), nisn: nisn.trim(), tgl: tgl.trim(), status: status.trim() });
                });
                localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa));
                refreshTable();
                Swal.fire('Berhasil', 'Data diimpor', 'success');
            };
            reader.readAsText(file);
        }

        setInterval(() => {
            if (!targetWaktu) return;
            const now = new Date().getTime();
            const target = new Date(targetWaktu).getTime();
            if (now >= target) {
                document.getElementById('siswaLoginForm').classList.remove('hidden');
                document.getElementById('time-gate').classList.add('hidden');
            } else {
                document.getElementById('siswaLoginForm').classList.add('hidden');
                document.getElementById('time-gate').classList.remove('hidden');
                document.getElementById('gate-msg').innerText = "Pengumuman dibuka pada: " + new Date(targetWaktu).toLocaleString();
                document.getElementById('timer').innerText = "Waktu sekarang: " + new Date().toLocaleTimeString();
            }
        }, 1000);

        let table, chartInstance;
        function showPage(page) {
            document.getElementById('page-dash').classList.toggle('hidden', page !== 'dash');
            document.getElementById('page-data').classList.toggle('hidden', page !== 'data');
            if(page === 'dash') updateDashboard();
        }
        function refreshTable() {
            table.clear();
            dataSiswa.forEach((s, index) => {
                table.row.add([s.nama, s.nisn, s.tgl, s.status, `<button onclick="editSiswa(${index})" class="text-blue-600 mr-2">Edit</button><button onclick="hapusSiswa(${index})" class="text-red-600">Hapus</button>`]);
            });
            table.draw();
        }
        function hapusSiswa(index) {
            Swal.fire({ title: 'Yakin?', icon: 'warning', showCancelButton: true }).then((r) => { if (r.isConfirmed) { dataSiswa.splice(index, 1); localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa)); refreshTable(); } });
        }
        function editSiswa(index) {
            const s = dataSiswa[index];
            Swal.fire({ title: 'Edit', html: `<input id="n" value="${s.nama}" class="swal2-input"><input id="t" type="date" value="${s.tgl}" class="swal2-input"><input id="st" value="${s.status}" class="swal2-input">`, preConfirm: () => { dataSiswa[index].nama = $('#n').val(); dataSiswa[index].tgl = $('#t').val(); dataSiswa[index].status = $('#st').val(); localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa)); refreshTable(); } });
        }
        function updateDashboard() {
            document.getElementById('stat-total').innerText = dataSiswa.length;
            document.getElementById('stat-lulus').innerText = dataSiswa.filter(s => s.status === 'Lulus').length;
            document.getElementById('stat-tdk').innerText = dataSiswa.filter(s => s.status === 'Tidak Lulus').length;
            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(document.getElementById('kelulusanChart').getContext('2d'), { type: 'pie', data: { labels: ['Lulus', 'Tidak Lulus'], datasets: [{ data: [dataSiswa.filter(s=>s.status=='Lulus').length, dataSiswa.filter(s=>s.status=='Tidak Lulus').length], backgroundColor: ['#3b82f6', '#ef4444'] }] } });
        }
        document.getElementById('addSiswaForm').addEventListener('submit', (e) => {
            e.preventDefault();
            dataSiswa.push({ nama: $('#in-nama').val(), nisn: $('#in-nisn').val(), tgl: $('#in-tgl').val(), status: $('#in-status').val() });
            localStorage.setItem('dataSiswa', JSON.stringify(dataSiswa));
            refreshTable(); $('#addSiswaForm')[0].reset(); Swal.fire('Sukses', 'Data disimpan', 'success');
        });
        document.getElementById('siswaLoginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const s = dataSiswa.find(x => x.nisn === $('#login-nisn').val() && x.tgl === $('#login-tgl').val());
            if(s) {
                Swal.fire({ title: s.status === 'Lulus' ? 'SELAMAT!' : 'MOHON MAAF!', text: `${s.nama}, Anda ${s.status}`, background: s.status === 'Lulus' ? '#1e40af' : '#b91c1c', color: '#ffffff', icon: s.status === 'Lulus' ? 'success' : 'error' });
                if(s.status === 'Lulus') confetti();
            } else { Swal.fire('Gagal', 'Data tidak ditemukan', 'error'); }
        });
        
        // Fungsi logoutAdmin sekarang akan kembali ke halaman login utama dan mereset view ke portal siswa
        function logoutAdmin() { 
            document.getElementById('admin-dashboard').classList.add('hidden'); 
            document.getElementById('login-page').classList.remove('hidden'); 
            toggleLogin(false); // Memastikan kembali ke portal login siswa
        }
    </script>
</body>
</html>
